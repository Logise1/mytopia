<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTopia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- Menú de Autenticación -->
        <div id="auth-menu">
            <div id="auth-tablon">
                <h2>Bienvenido a MyTopia</h2>
                <div id="login-form">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <p id="auth-error" class="error-text"></p>
                    <button id="auth-action-btn">Entrar</button>
                    <p id="toggle-auth">¿No tienes cuenta? Regístrate</p>
                </div>
            </div>
        </div>

        <!-- Menú de personalización (ahora se activa tras el login) -->
        <div id="skin-menu" class="hidden">
            <h3>Elige tu piel</h3>
            <div class="color-options">
                <button class="color-btn" style="background-color: #ffffff;" data-color="#ffffff"></button>
                <button class="color-btn" style="background-color: #ffdbac;" data-color="#ffdbac"></button>
                <button class="color-btn" style="background-color: #f1c27d;" data-color="#f1c27d"></button>
                <button class="color-btn" style="background-color: #e0ac69;" data-color="#e0ac69"></button>
                <button class="color-btn" style="background-color: #8d5524;" data-color="#8d5524"></button>
                <button class="color-btn" style="background-color: #c68642;" data-color="#c68642"></button>
                <button class="color-btn" style="background-color: #2b1d0e;" data-color="#2b1d0e"></button>
            </div>
            <button id="start-game">¡Listo!</button>
        </div>
    </div>

    <button id="logout-btn" class="hidden">Cerrar sesión</button>

    <!-- UI de Viaje -->
    <div id="travel-menu" class="hidden">
        <div id="travel-content">
            <h2 id="travel-title">¿A dónde quieres viajar?</h2>
            
            <div id="travel-selection">
                <button id="go-home-btn" class="travel-btn">🏠 Mi Isla</button>
                <h3>Islas de otros vecinos:</h3>
                <div id="other-islands-list"></div>
                <button id="close-travel-btn" class="close-btn">Cancelar</button>
            </div>

            <div id="travel-progress-ui" class="hidden">
                <h2>Viajando... <span class="emoji">✈️</span></h2>
                <div class="news-ticker">
                    <p>Noticias de Mytopia: ¡Se han avistado peces nuevos en el este!</p>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="flight-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Assets -->
    <div style="display:none;">
        <img id="tile-sprite" src="sprites/tiles/base_tile.png">
    </div>


    <!-- Firebase SDK (v10+) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración exportada para game.js
        window.firebaseConfig = {
            apiKey: "AIzaSyCn31YaFgeC8D1JveJUSYrHkVk8cys6o90",
            authDomain: "mytopia-7df51.firebaseapp.com",
            databaseURL: "https://mytopia-7df51-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mytopia-7df51",
            storageBucket: "mytopia-7df51.firebasestorage.app",
            messagingSenderId: "476930744741",
            appId: "1:476930744741:web:9f630c7ed1bc4b4126084c",
            measurementId: "G-SM7C0ZVTG6"
        };

        // Exportar módulos a window para game.js
        window.fb = { initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, getDatabase, ref, set, onValue, update, onDisconnect, getFirestore, doc, setDoc, getDoc };
    </script>

    <script src="game.js"></script>
</body>

</html>
